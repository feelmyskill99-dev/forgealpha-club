name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      ENV: test
      BOT_TOKEN: "123456:test"
      ADMIN_ID: "123456789"
      PAYMENT_WALLET: "test_wallet"
      DATABASE_URL: "forgealpha_test.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ruff
        run: ruff check .
      - name: Tests
        run: pytest
      - name: Mypy
        run: mypy app/
